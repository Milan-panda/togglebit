services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://togglebit:${POSTGRES_PASSWORD}@postgres:5432/togglebit}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:${APP_PORT:-3000}}
      ENVIRONMENT: development
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gatepost

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_TOGGLEBIT_API_KEY: ${NEXT_PUBLIC_TOGGLEBIT_API_KEY:-}
        NEXT_PUBLIC_TOGGLEBIT_API_URL: ${NEXT_PUBLIC_TOGGLEBIT_API_URL:-/api}
        NEXT_PUBLIC_TOGGLEBIT_ENV: ${NEXT_PUBLIC_TOGGLEBIT_ENV:-dev}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_TOGGLEBIT_API_URL: ${NEXT_PUBLIC_TOGGLEBIT_API_URL:-/api}
      NEXT_PUBLIC_TOGGLEBIT_ENV: ${NEXT_PUBLIC_TOGGLEBIT_ENV:-dev}
      NODE_ENV: development
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter ./apps/dashboard dev"
    volumes:
      - .:/workspace
      - dashboard_root_node_modules:/workspace/node_modules
      - dashboard_app_node_modules:/workspace/apps/dashboard/node_modules
    depends_on:
      api:
        condition: service_started
    networks:
      - gatepost

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${APP_PORT:-3000}:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      api:
        condition: service_started
      dashboard:
        condition: service_started
    networks:
      - gatepost

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: togglebit
      POSTGRES_USER: togglebit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U togglebit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gatepost

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gatepost

networks:
  gatepost:
    name: gatepost

volumes:
  dashboard_root_node_modules:
  dashboard_app_node_modules:
  postgres_data:
  redis_data:
